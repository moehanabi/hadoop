/**
 * These .proto interfaces are private and stable.
 * Please see https://hadoop.apache.org/docs/current/hadoop-project-dist/hadoop-common/Compatibility.html
 * for what changes are allowed for a *stable* .proto interface.
 */
syntax="proto2";
// This file contains protocol buffers that are used throughout HDFS -- i.e.
// by the client, server, and data transfer protocols.


option java_package = "org.apache.hadoop.hdfs.protocol.proto";
option java_outer_classname = "CompressionZonesProtos";
option java_generate_equals_and_hash = true;
package hadoop.hdfs;

import "hdfs.proto";

message CreateCompressionZoneRequestProto {
  required string src = 1;
  optional string codec = 2;
}

message CreateCompressionZoneResponseProto {
}

message ListCompressionZonesRequestProto {
  required int64 id = 1;
}

message CompressionZoneProto {
  required int64 id = 1;
  required string path = 2;
  required string compressionCodec = 3;
}

message ListCompressionZonesResponseProto {
  repeated CompressionZoneProto zones = 1;
  required bool hasMore = 2;
}

message GetCZForPathRequestProto {
    required string src = 1;
}

message GetCZForPathResponseProto {
    optional CompressionZoneProto zone = 1;
}
